<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Heated Chat</title>
    <style>
      body { font-family: Arial, sans-serif; max-width: 760px; margin: 24px auto; padding: 0 12px; }
      #topbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
      #meta { color: #555; font-size: 14px; }
      #typing { color: #777; font-size: 14px; height: 18px; margin: 8px 0; }
      #messages { list-style: none; padding: 0; }
      #messages li { padding: 6px 10px; margin: 6px 0; border: 1px solid #ddd; border-radius: 8px; }
      #messages li.system { border-style: dashed; color: #555; font-style: italic; }
      form { display: flex; gap: 8px; margin-top: 12px; }
      input { flex: 1; padding: 10px; }
      button { padding: 10px 14px; }
    </style>
  </head>

  <body>
    <div id="topbar">
      <h2 style="margin: 0;">Simple Chat</h2>
      <div id="meta"></div>
      <button id="change" type="button">Change name/room</button>
    </div>

    <div id="typing"></div>
    <ul id="messages"></ul>

    <form id="form">
      <input id="input" autocomplete="off" placeholder="Type a message..." />
      <button type="submit">Send</button>
    </form>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();

      const form = document.getElementById("form");
      const input = document.getElementById("input");
      const messages = document.getElementById("messages");
      const meta = document.getElementById("meta");
      const typingEl = document.getElementById("typing");
      const changeBtn = document.getElementById("change");

      function getOrAsk(key, promptText, fallback) {
        let val = localStorage.getItem(key);
        if (!val) {
          val = window.prompt(promptText) || fallback;
          val = String(val).trim() || fallback;
          localStorage.setItem(key, val);
        }
        return val;
      }

      function formatTime(t) {
        return new Date(t).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      }

      function addLine(text, isSystem = false) {
        const li = document.createElement("li");
        li.textContent = text;
        if (isSystem) li.classList.add("system");
        messages.appendChild(li);
        window.scrollTo(0, document.body.scrollHeight);
      }

      // ---------- Level 1: username + room code ----------
      let username = getOrAsk("chat_username", "Enter your username:", "Anonymous");
      let room = getOrAsk("chat_room", "Enter room code (share this with your friend):", "lobby");

      // ---------- Room password ----------
      // We do NOT store password in localStorage (safer).
      // If the password is wrong, the server will send auth_error then disconnect.
      const password = window.prompt("Room password:") || "";

      meta.textContent = `Room: ${room} | You: ${username}`;

      // Join the room with password
      socket.emit("join", { username, room, password });

      // If password is wrong (server emits auth_error then disconnects)
      socket.on("auth_error", (msg) => {
        alert(msg || "Wrong password.");
        // Optional: let you easily re-enter name/room (uncomment if you want)
        // localStorage.removeItem("chat_username");
        // localStorage.removeItem("chat_room");
      });

      // ---------- Level 1: timestamps + join/leave notifications ----------
      socket.on("chat message", (msg) => {
        addLine(`[${formatTime(msg.t)}] ${msg.username}: ${msg.text}`);
      });

      socket.on("system", (evt) => {
        const action = evt.type === "join" ? "joined" : "left";
        addLine(`[${formatTime(evt.t)}] ${evt.username} ${action} the room`, true);
      });

      // ---------- Level 1: typing indicator ----------
      const typingUsers = new Set();
      let typingTimeout = null;

      function renderTyping() {
        if (typingUsers.size === 0) {
          typingEl.textContent = "";
          return;
        }
        const names = Array.from(typingUsers);
        typingEl.textContent =
          names.length === 1 ? `${names[0]} is typing…` : `${names.join(", ")} are typing…`;
      }

      socket.on("typing", ({ username: u, isTyping }) => {
        if (!u) return;
        if (isTyping) typingUsers.add(u);
        else typingUsers.delete(u);
        renderTyping();
      });

      input.addEventListener("input", () => {
        socket.emit("typing", true);
        if (typingTimeout) clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
          socket.emit("typing", false);
        }, 900);
      });

      // Stop typing + send message
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const text = input.value.trim();
        if (!text) return;

        socket.emit("chat message", text);
        socket.emit("typing", false);

        input.value = "";
      });

      // Change username/room button
      changeBtn.addEventListener("click", () => {
        localStorage.removeItem("chat_username");
        localStorage.removeItem("chat_room");
        window.location.reload();
      });
    </script>
  </body>
</html>
