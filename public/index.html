<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <!-- IMPORTANT for phones -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <title>Basic Chat</title>

    <style>
      :root {
        --bg: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --border: #e5e7eb;

        --panel: #f9fafb;

        --bubble-other: #f3f4f6;
        --bubble-mine: #e0f2fe;
        --bubble-system: #fff7ed;

        --shadow: rgba(0, 0, 0, 0.06);

        --ios-blue: #0a84ff;
        --radius: 16px;
      }

      [data-theme="dark"] {
        --bg: #0b1220;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --border: #1f2937;

        --panel: #0f172a;

        --bubble-other: #111827;
        --bubble-mine: #0b3a5a;
        --bubble-system: #2a1f14;

        --shadow: rgba(0, 0, 0, 0.35);
      }

      * { box-sizing: border-box; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        max-width: 820px;
        margin: 24px auto;
        padding: 0 12px;
        background: var(--bg);
        color: var(--text);
      }

      /* Header */
      #topbar {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
        justify-content: space-between;
      }

      #leftTop {
        display: flex;
        gap: 10px;
        align-items: baseline;
        flex-wrap: wrap;
      }

      h2 { margin: 0; }

      #meta {
        color: var(--muted);
        font-size: 14px;
      }

      #controls {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      button {
        padding: 9px 12px;
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        border-radius: 12px;
        cursor: pointer;
        box-shadow: 0 1px 0 var(--shadow);
      }
      button:hover { filter: brightness(0.98); }
      button:active { transform: translateY(1px); }

      /* Typing */
      #typing {
        color: var(--muted);
        font-size: 14px;
        height: 18px;
        margin: 10px 2px 8px;
      }

      /* Chat container (desktop) */
      #messages {
        list-style: none;
        padding: 12px;
        margin: 0;
        border: 1px solid var(--border);
        background: var(--panel);
        border-radius: 16px;
        min-height: 320px;
        box-shadow: 0 6px 20px var(--shadow);

        /* allow smooth scrolling */
        overflow-y: auto;
      }

      /* Rows */
      .row { display: flex; margin: 8px 0; }
      .row.left { justify-content: flex-start; }
      .row.right { justify-content: flex-end; }
      .row.center { justify-content: center; }

      /* Bubbles */
      .bubble {
        max-width: min(560px, 92%);
        padding: 10px 12px;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        line-height: 1.25rem;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .bubble.other { background: var(--bubble-other); }
      .bubble.mine { background: var(--bubble-mine); border-color: transparent; }
      .bubble.system { background: var(--bubble-system); font-style: italic; color: var(--muted); }

      .bubbleHeader {
        display: flex;
        gap: 8px;
        align-items: baseline;
        margin-bottom: 6px;
      }

      .name { font-weight: 700; font-size: 13px; }
      .time { font-size: 12px; color: var(--muted); }
      .text { font-size: 14px; }

      /* Composer (desktop) */
      form {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }

      input {
        flex: 1;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--text);
        outline: none;
      }

      input::placeholder { color: var(--muted); }

      /* ---- iMessage-ish MOBILE MODE ---- */
      @media (max-width: 600px) {
        body {
          max-width: none;
          margin: 0;
          padding: 0;
          height: 100dvh; /* dynamic viewport height (better with keyboard) */
          overflow: hidden; /* we will scroll inside the message list */
        }

        /* App layout: header, typing, messages, composer fixed */
        #app {
          display: flex;
          flex-direction: column;
          height: 100dvh;
          padding-top: env(safe-area-inset-top);
          padding-bottom: env(safe-area-inset-bottom);
          background: var(--bg);
        }

        #topbar {
          padding: 10px 12px 6px;
          border-bottom: 1px solid var(--border);
          background: var(--bg);
        }

        #leftTop h2 { font-size: 18px; }
        #meta { font-size: 12px; }

        #controls button {
          padding: 8px 10px;
          border-radius: 12px;
        }

        #typing {
          margin: 6px 12px 0;
          height: 18px;
        }

        #messages {
          flex: 1;
          overflow-y: auto;
          scroll-behavior: smooth;
          margin: 8px 0 0;
          border: none;
          border-top: 1px solid var(--border);
          border-radius: 0;
          box-shadow: none;
          padding: 12px 12px 10px;
          background: var(--bg);
        }

        /* Bigger bubbles, like iMessage */
        .bubble {
          max-width: 78%;
          border-radius: 18px;
          padding: 10px 12px;
        }

        .bubbleHeader { display: none; } /* iMessage usually doesn't show headers */
        .text { font-size: 16px; line-height: 1.35rem; }

        /* Make mine feel iMessage-y */
        .bubble.mine {
          background: var(--ios-blue);
          color: #fff;
        }
        [data-theme="dark"] .bubble.mine {
          background: var(--ios-blue);
          color: #fff;
        }

        .bubble.system {
          border-style: dashed;
          opacity: 0.9;
        }

        /* Composer pinned to bottom */
        form {
          position: sticky;
          bottom: 0;
          margin: 0;
          padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
          gap: 8px;
          background: var(--bg);
          border-top: 1px solid var(--border);

          /* slick part */
          transform: translateY(0px);
          transition: transform 180ms ease;
          will-change: transform;
        }

        input {
          border-radius: 20px;
          padding: 12px 14px;
          font-size: 16px; /* prevents iOS zoom */
        }

        button[type="submit"] {
          border-radius: 18px;
          padding: 10px 14px;
          font-weight: 600;
        }
      }
    </style>
  </head>

  <body>
    <!-- Wrapper used for mobile layout -->
    <div id="app">
      <div id="topbar">
        <div id="leftTop">
          <h2>Basic Chat</h2>
          <div id="meta"></div>
        </div>

        <div id="controls">
          <button id="theme" type="button">🌙 Dark</button>
          <button id="change" type="button">Change name/room</button>
        </div>
      </div>

      <div id="typing"></div>

      <ul id="messages"></ul>

      <form id="form">
        <input id="input" autocomplete="off" placeholder="Type a message..." enterkeyhint="send" />
        <button type="submit">Send</button>
      </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();

      const form = document.getElementById("form");
      const input = document.getElementById("input");
      const messages = document.getElementById("messages");
      const meta = document.getElementById("meta");
      const typingEl = document.getElementById("typing");
      const changeBtn = document.getElementById("change");
      const themeBtn = document.getElementById("theme");

      // -------- Dark mode toggle --------
      function applyTheme(theme) {
        document.documentElement.setAttribute("data-theme", theme);
        themeBtn.textContent = theme === "dark" ? "☀️ Light" : "🌙 Dark";
      }
      const savedTheme = localStorage.getItem("chat_theme") || "light";
      applyTheme(savedTheme);

      themeBtn.addEventListener("click", () => {
        const current = document.documentElement.getAttribute("data-theme") || "light";
        const next = current === "dark" ? "light" : "dark";
        localStorage.setItem("chat_theme", next);
        applyTheme(next);
      });

      // -------- Helpers --------
      function getOrAsk(key, promptText, fallback) {
        let val = localStorage.getItem(key);
        if (!val) {
          val = window.prompt(promptText) || fallback;
          val = String(val).trim() || fallback;
          localStorage.setItem(key, val);
        }
        return val;
      }

      function formatTime(t) {
        return new Date(t).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      }

      function scrollToBottom(force = false) {
        const threshold = 100; // px from bottom
        const distanceFromBottom =
          messages.scrollHeight - messages.scrollTop - messages.clientHeight;

        if (force || distanceFromBottom < threshold) {
          requestAnimationFrame(() => {
          messages.scrollTop = messages.scrollHeight;
          });
        }
      }

      function addBubble({ align = "left", variant = "other", name = "", time = "", text = "" }) {
        const row = document.createElement("li");
        row.className = `row ${align}`;

        const bubble = document.createElement("div");
        bubble.className = `bubble ${variant}`;

        if (variant === "system") {
          bubble.textContent = text;
        } else {
          const header = document.createElement("div");
          header.className = "bubbleHeader";

          const nameEl = document.createElement("div");
          nameEl.className = "name";
          nameEl.textContent = name;

          const timeEl = document.createElement("div");
          timeEl.className = "time";
          timeEl.textContent = time;

          header.appendChild(nameEl);
          header.appendChild(timeEl);

          const body = document.createElement("div");
          body.className = "text";
          body.textContent = text;

          bubble.appendChild(header);
          bubble.appendChild(body);
        }

        row.appendChild(bubble);
        messages.appendChild(row);
        scrollToBottom();

      }
      

      // -------- Username + room --------
      let username = getOrAsk("chat_username", "Enter your username:", "Anonymous");
      let room = getOrAsk("chat_room", "Enter room code (share this with your friend):", "lobby");

      // -------- Room password --------
      const password = window.prompt("Room password:") || "";

      meta.textContent = `Room: ${room} | You: ${username}`;

      socket.emit("join", { username, room, password });

      socket.on("auth_error", (msg) => {
        alert(msg || "Wrong password.");
      });

      // -------- Messages --------
      socket.on("chat message", (msg) => {
        const mine = msg.username === username;
        
        // Desktop shows header; mobile hides header via CSS
        addBubble({
          align: mine ? "right" : "left",
          variant: mine ? "mine" : "other",
          name: mine ? "You" : msg.username,
          time: formatTime(msg.t),
          text: msg.text
        });
      });

      socket.on("system", (evt) => {
        const action = evt.type === "join" ? "joined" : "left";
        addBubble({
          align: "center",
          variant: "system",
          text: `[${formatTime(evt.t)}] ${evt.username} ${action} the room`
        });
      });

      // -------- Typing indicator --------
      const typingUsers = new Set();
      let typingTimeout = null;

      function renderTyping() {
        const names = Array.from(typingUsers).filter(n => n && n !== username);
        if (names.length === 0) {
          typingEl.textContent = "";
          return;
        }
        typingEl.textContent =
          names.length === 1 ? `${names[0]} is typing…` : `${names.join(", ")} are typing…`;
      }

      socket.on("typing", ({ username: u, isTyping }) => {
        if (!u) return;
        if (isTyping) typingUsers.add(u);
        else typingUsers.delete(u);
        renderTyping();
      });

      input.addEventListener("input", () => {
        socket.emit("typing", true);
        if (typingTimeout) clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => socket.emit("typing", false), 900);
      });

      // Send message
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const text = input.value.trim();
        if (!text) return;

        socket.emit("chat message", text);
        socket.emit("typing", false);
        input.value = "";
        input.focus();
      });

      // Let's return key send message
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();        // prevent newline
        form.requestSubmit();
        }
      });

      // Change username/room button
      changeBtn.addEventListener("click", () => {
        localStorage.removeItem("chat_username");
        localStorage.removeItem("chat_room");
        window.location.reload();
      });

      // Focus input and keep scroll pinned on load
      input.focus();
      setTimeout(() => { messages.scrollTop = messages.scrollHeight; }, 0);

      // Handle keyboard resize
      window.addEventListener("resize", () => {
        scrollToBottom();
      });

      // --- Mobile keyboard smooth composer lift (iOS/Android) ---
      (function enableKeyboardLift() {
        if (!window.visualViewport) return;

        const vv = window.visualViewport;

        const update = () => {
        // When the keyboard opens, vv.height shrinks.
        // The "gap" between layout viewport and visual viewport is roughly:
        const keyboardHeight = Math.max(0, window.innerHeight - vv.height - vv.offsetTop);

        // Move the composer up by that amount
        form.style.transform = `translateY(${-keyboardHeight}px)`;

        // Keep the latest messages visible too
        // (Only if user is near the bottom—matches your scrollToBottom behavior)
        if (typeof scrollToBottom === "function") scrollToBottom();
      };

      vv.addEventListener("resize", update);
      vv.addEventListener("scroll", update); // handles iOS offsetTop changes
      window.addEventListener("orientationchange", () => setTimeout(update, 50));

      update();
    })();

    </script>
  </body>
</html>
